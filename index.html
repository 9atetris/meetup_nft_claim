<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starknet Meetup Japan — Claim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700&family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    .wrap {
      width: 100%;
      min-height: 100vh;
      background: #22e855;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      position: relative;
      overflow: hidden;
      padding: 60px 20px;
    }
    .grid-bg {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.06) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
    }
    .star { position: absolute; z-index: 1; pointer-events: none; }
    .corner { position: absolute; width: 26px; height: 26px; background: #00cc33; border: 3px solid #006618; z-index: 2; }
    .corner.tl { top: 12px; left: 12px; }
    .corner.tr { top: 12px; right: 12px; }
    .corner.bl { bottom: 12px; left: 12px; }
    .corner.br { bottom: 12px; right: 12px; }
    .title {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 700;
      font-size: clamp(16px, 4vw, 22px);
      color: #0a3a14;
      letter-spacing: 0.08em;
      z-index: 3;
      text-align: center;
    }
    .pixel-btn {
      position: relative; z-index: 3;
      cursor: pointer; border: none; background: none; padding: 0; outline: none;
    }
    .pixel-btn:active { transform: translateY(4px); }
    .outer {
      display: block;
      background: #ffb7c5;
      border: 4px solid #1a0800;
      border-radius: 18px;
      padding: clamp(14px, 3vw, 18px) clamp(48px, 10vw, 72px);
      position: relative;
      box-shadow: 0 6px 0 #d9788a, 0 6px 0 3px #1a0800;
      transition: box-shadow 0.1s, transform 0.1s;
    }
    .pixel-btn:active .outer {
      box-shadow: 0 2px 0 #d9788a, 0 2px 0 3px #1a0800;
      transform: translateY(4px);
    }
    .highlight { position: absolute; top: 7px; left: 14px; right: 14px; height: 7px; background: rgba(255,255,255,0.45); border-radius: 8px; }
    .btn-label {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(28px, 6vw, 38px);
      color: #1a0800;
      letter-spacing: 0.06em;
      display: block;
      position: relative; z-index: 1;
    }
    .pixel-btn.loading .btn-label { opacity: 0.3; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="grid-bg"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <svg class="star" style="top:5%;left:10%;width:22px;height:22px;" viewBox="0 0 24 24"><polygon points="12,2 14.5,9.5 22,9.5 16,14.5 18.5,22 12,17.5 5.5,22 8,14.5 2,9.5 9.5,9.5" fill="#00aa28" opacity="0.5"/></svg>
    <svg class="star" style="top:8%;right:12%;width:14px;height:14px;" viewBox="0 0 24 24"><polygon points="12,2 14.5,9.5 22,9.5 16,14.5 18.5,22 12,17.5 5.5,22 8,14.5 2,9.5 9.5,9.5" fill="#00aa28" opacity="0.45"/></svg>
    <svg class="star" style="top:20%;left:5%;width:10px;height:10px;" viewBox="0 0 24 24"><circle cx="12" cy="12" r="6" fill="#00aa28" opacity="0.35"/></svg>
    <svg class="star" style="top:30%;right:6%;width:10px;height:10px;" viewBox="0 0 24 24"><circle cx="12" cy="12" r="6" fill="#00aa28" opacity="0.3"/></svg>
    <svg class="star" style="bottom:15%;left:8%;width:18px;height:18px;" viewBox="0 0 24 24"><polygon points="12,2 14.5,9.5 22,9.5 16,14.5 18.5,22 12,17.5 5.5,22 8,14.5 2,9.5 9.5,9.5" fill="#00aa28" opacity="0.4"/></svg>
    <svg class="star" style="bottom:10%;right:10%;width:12px;height:12px;" viewBox="0 0 24 24"><polygon points="12,2 14.5,9.5 22,9.5 16,14.5 18.5,22 12,17.5 5.5,22 8,14.5 2,9.5 9.5,9.5" fill="#00aa28" opacity="0.5"/></svg>
    <svg class="star" style="bottom:25%;right:5%;width:9px;height:9px;" viewBox="0 0 24 24"><circle cx="12" cy="12" r="6" fill="#00aa28" opacity="0.3"/></svg>
    <svg class="star" style="top:50%;left:3%;width:8px;height:8px;" viewBox="0 0 24 24"><circle cx="12" cy="12" r="6" fill="#00aa28" opacity="0.25"/></svg>

    <div class="title">STARKNET MEETUP 日本</div>

    <button class="pixel-btn" id="btn" onclick="handleClaim()">
      <span class="outer">
        <span class="highlight"></span>
        <span class="btn-label" id="label">Claim</span>
      </span>
    </button>
  </div>

  <script>
    function handleClaim() {
      const btn = document.getElementById('btn');
      const label = document.getElementById('label');
      btn.classList.add('loading');
      label.textContent = '...';
      // ここにCartridgeのwallet処理を追加
    }
  </script>
</body>
</html>
